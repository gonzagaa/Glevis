<section class="section-form" aria-labelledby="vip-title">
  <div class="section__layer">
    <div class="section-form__img" role="img" aria-label="Editorial Glevis"></div>
    <div class="form-block">
      <h2 id="vip-title" class="form-block__title">O movimento está prestes a começar. Você vem?</h2>
    </div>
    <form id="vip-form" class="vip-form" novalidate>
      <label class="vip-input vip-input--with-label">
        <span class="vip-input__label">Nome:</span>
        <input class="vip-input__field" type="text" name="nome" required placeholder="Como você gosta de ser chamada?" autocomplete="given-name" />
      </label>
      <label class="vip-input vip-input--with-label">
        <span class="vip-input__label">Email:</span>
        <input class="vip-input__field" type="email" name="email" required placeholder="Para onde enviamos o seu convite VIP?" autocomplete="email" />
      </label>
      <label class="vip-input vip-input--with-label">
        <span class="vip-input__label">WhatsApp:</span>
        <input class="vip-input__field" type="tel" name="whatsapp" placeholder="Para avisos em tempo real" autocomplete="tel" />
      </label>
      <button id="vip-form__cta" class="vip-form__cta" type="submit" style="justify-content: center">
        Garantir&nbsp; MEU acesso VIP!
      </button>
    </form>
  </div>
</section>
